apiVersion: v1
kind: List
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: todo-web
      labels:
        app: todo-web
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: todo-web
      template:
        metadata:
          labels:
            app: todo-web
        spec:
          containers:
            - name: web
              image: todo-web:latest
              imagePullPolicy: Always
              ports:
                - containerPort: 8080
                  name: http
              env:
                - name: DB_HOST
                  value: todo-db
                - name: DB_PORT
                  value: "5432"
                - name: DB_USER
                  value: todo
                - name: DB_PASSWORD
                  value: todo
                - name: DB_NAME
                  value: todo
                - name: PORT
                  value: "8080"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8080
                initialDelaySeconds: 10
                periodSeconds: 5
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8080
                initialDelaySeconds: 30
                periodSeconds: 10

  - apiVersion: v1
    kind: Service
    metadata:
      name: todo-web
      labels:
        app: todo-web
    spec:
      selector:
        app: todo-web
      ports:
        - name: http
          port: 8080
          targetPort: 8080

  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: todo-web
      labels:
        app: todo-web
    spec:
      to:
        kind: Service
        name: todo-web
      port:
        targetPort: http
      tls:
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
