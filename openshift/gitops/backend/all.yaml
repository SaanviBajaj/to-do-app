apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: todo-db-data
      labels:
        app: todo-db
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: todo-db
      labels:
        app: todo-db
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: todo-db
      template:
        metadata:
          labels:
            app: todo-db
        spec:
          securityContext:
            fsGroup: 999
          containers:
            - name: postgres
              image: quay.io/rh-ee-sbajaj/todo-db:v5
              imagePullPolicy: Always
              ports:
                - containerPort: 5432
                  name: postgres
              env:
                - name: POSTGRES_USER
                  value: todo
                - name: POSTGRES_PASSWORD
                  value: todo
                - name: POSTGRES_DB
                  value: todo
                - name: PGDATA
                  value: /var/lib/postgresql/data/pgdata
              resources:
                requests:
                  memory: 256Mi
                  cpu: 100m
                limits:
                  memory: 512Mi
                  cpu: 500m
              volumeMounts:
                - name: postgres-data
                  mountPath: /var/lib/postgresql/data
          volumes:
            - name: postgres-data
              persistentVolumeClaim:
                claimName: todo-db-data

  - apiVersion: v1
    kind: Service
    metadata:
      name: todo-db
      labels:
        app: todo-db
    spec:
      selector:
        app: todo-db
      ports:
        - name: postgres
          port: 5432
          targetPort: 5432
